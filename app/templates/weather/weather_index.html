<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода в Иркутске</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/weather_style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>
<body>
    <div class="weather-container">
        <div class="weather-card">
            <h1>Погода в Иркутске</h1>
            <div class="weather-info">
                <div class="weather-type" id="weatherType">Загрузка...</div>
                <div class="temperature" id="temperature">--°C</div>
                <div class="advice" id="advice">
                    <div class="advice-text">Загрузка совета...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Контейнеры для анимаций -->
    <div id="rain-container" class="animation-container" style="display: none;"></div>
    <div id="snow-container" class="animation-container" style="display: none;">
        <canvas id="snow-canvas"></canvas>
    </div>
    <div id="clouds-container" class="animation-container" style="display: none;">
        <div class="clouds-animation">
            <div class="cloud x1"></div>
            <div class="cloud x2"></div>
            <div class="cloud x3"></div>
            <div class="cloud x4"></div>
            <div class="cloud x5"></div>
            <div class="cloud x6"></div>
            <div class="cloud x7"></div>
            <div class="cloud x8"></div>
            <div class="cloud x9"></div>
            <div class="cloud x10"></div>
        </div>
    </div>

    <script>
        let currentWeather = null;
        let rainAnimation = null;
        
        // Списки советов
        const adviceLists = {
            rain: [
                "Не забудьте зонт! Дождь может усилиться в любой момент.",
                "Одевайтесь теплее и берите непромокаемую куртку.",
                "Будьте осторожны за рулём - дороги скользкие от дождя.",
                "Отличный день, чтобы остаться дома с чашкой горячего чая!",
                "Наденьте резиновые сапоги - лужи неизбежны!"
            ],
            snow: [
                "Наденьте шапку и варежки! Мороз щиплет щёки.",
                "Осторожно на дорогах - гололёд! Делайте маленькие шаги.",
                "Отличная погода для лепки снеговика и игры в снежки!",
                "Не забудьте шарф - защитите шею от холодного ветра.",
                "Самое время для катания на лыжах или сноуборде!"
            ],
            clouds: [
                "Пасмурно, но зонт можете не брать - дождя не ожидается.",
                "Возьмите ветровку - ветер может быть прохладным.",
                "Хороший день для чтения книги у окна с чашечкой кофе.",
                "Погода подходит для спокойной прогулки в парке.",
                "Отличный день для просмотра кино дома!"
            ],
            clear: [
                "Отличная погода для прогулки! Не забудьте солнцезащитные очки.",
                "Нанесите солнцезащитный крем - солнце активное!",
                "Пейте больше воды, чтобы избежать обезвоживания.",
                "Самое время для велопрогулки или пикника!",
                "Наденьте головной убор, чтобы не перегреться."
            ]
        };

        function getRandomAdvice(weatherType) {
            const advices = adviceLists[weatherType] || adviceLists.clear;
            const randomIndex = Math.floor(Math.random() * advices.length);
            return advices[randomIndex];
        }

        async function fetchWeather() {
            try {
                const response = await fetch('/api/weather');
                const data = await response.json();
                currentWeather = data;
                updateUI(data);
                showAnimation(data.weather_type);
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        function updateUI(weather) {
            const weatherIcon = getWeatherIcon(weather.weather_type);
            document.getElementById('weatherType').innerHTML = `${weatherIcon} ${getWeatherName(weather.weather_type)}`;
            document.getElementById('temperature').innerHTML = `${weather.temperature}°C`;
            document.querySelector('.advice-text').innerHTML = weather.advice;
        }

        function getWeatherIcon(type) {
            const icons = {
                'rain': '🌧️',
                'snow': '❄️',
                'clouds': '☁️',
                'clear': '☀️'
            };
            return icons[type] || '☀️';
        }

        function getWeatherName(type) {
            const names = {
                'rain': 'Дождь',
                'snow': 'Снег',
                'clouds': 'Облачно',
                'clear': 'Ясно'
            };
            return names[type] || 'Ясно';
        }

        function showAnimation(type) {
            document.getElementById('rain-container').style.display = 'none';
            document.getElementById('snow-container').style.display = 'none';
            document.getElementById('clouds-container').style.display = 'none';

            switch(type) {
                case 'rain':
                    document.getElementById('rain-container').style.display = 'block';
                    startRainAnimation();
                    document.body.style.background = '#3a6b9e';
                    break;
                case 'snow':
                    document.getElementById('snow-container').style.display = 'block';
                    startSnowAnimation();
                    document.body.style.background = '#7faed4';
                    break;
                case 'clouds':
                    document.getElementById('clouds-container').style.display = 'block';
                    document.body.style.background = '#89b8dd';
                    break;
                default:
                    document.body.style.background = '#a8cbe8';
            }
        }

        function startRainAnimation() {
            if (window.rainSketch) {
                removeRainCanvas();
            }
            
            const container = document.getElementById('rain-container');
            container.innerHTML = '<div id="rain-canvas-container"></div>';
            
            window.rainSketch = new p5((p) => {
                let rain;
                
                class Particle {
                    constructor(x, y, vx, vy) {
                        this.pos = p.createVector(x, y);
                        this.vel = p.createVector(vx, vy);
                        this.acc = p.createVector(0, -0.1);
                        this.radius = 2;
                    }
                
                    draw() {
                        p.noStroke();
                        p.fill(200, 200, 255, 180);
                        p.ellipse(this.pos.x, p.height - this.pos.y, this.radius);
                    }
                
                    update() {
                        this.vel.add(this.acc);
                        this.pos.add(this.vel);
                    }
                }
                
                class RainSplat {
                    constructor(rainDrop) {
                        this.particles = [];
                        const numberOfParticles = 6;
                        for (let i = 0; i < numberOfParticles; ++i) {
                            const x = rainDrop.pos.x;
                            const y = 0;
                            const vx = p.random(-1.5, 1.5);
                            const vy = p.random(0, -1 * rainDrop.vel.y / 6);
                            this.particles.push(new Particle(x, y, vx, vy));
                        }
                    }
                
                    draw() {
                        this.particles.forEach(particle => particle.draw());
                    }
                
                    update() {
                        this.particles.forEach(particle => particle.update());
                    }
                
                    isVisible() {
                        for (const particle of this.particles) {
                            if (particle.pos.y + particle.radius > 0) {
                                return true;
                            }
                        }
                        return false;
                    }
                }
                
                class RainDrop {
                    constructor() {
                        this.reset();
                        this.acc = p.createVector(0, -0.1);
                        this.length = 20;
                        this.width = 2;
                    }
                
                    draw() {
                        p.noStroke();
                        p.fill(180, 180, 255, 180);
                        p.rect(this.pos.x, p.height - this.pos.y, this.width, this.length);
                    }
                
                    update() {
                        this.vel.add(this.acc);
                        this.pos.add(this.vel);
                    }
                
                    hasHitFloor() {
                        return this.pos.y - this.length <= 0;
                    }
                
                    reset() {
                        this.pos = p.createVector(p.random(p.width), p.random(p.height + 100, p.height + 1000));
                        this.vel = p.createVector(0, p.random(-8, -3));
                    }
                }
                
                class Rain {
                    constructor(totalDrops) {
                        this.rainDrops = [];
                        for (let i = 0; i < totalDrops; ++i) {
                            this.rainDrops.push(new RainDrop());
                        }
                        this.rainSplats = [];
                    }
                
                    draw() {
                        this.rainDrops.forEach(rainDrop => rainDrop.draw());
                        this.rainSplats.forEach(rainSplat => rainSplat.draw());
                    }
                    
                    update() {
                        this.rainDrops.forEach(rainDrop => rainDrop.update());
                        this.rainSplats.forEach(rainSplat => rainSplat.update());
                    }
                
                    resolveCollisions() {
                        this.rainDrops.forEach(rainDrop => {
                            if (rainDrop.hasHitFloor()) {
                                this.rainSplats.push(new RainSplat(rainDrop));
                                rainDrop.reset();
                            }
                        });
                    }
                
                    cullSplats() {
                        for (let i = this.rainSplats.length - 1; i >= 0; --i) {
                            if (!this.rainSplats[i].isVisible()) {
                                this.rainSplats.splice(i, 1);
                            }
                        }
                    }
                }
                
                p.setup = () => {
                    const canvas = p.createCanvas(window.innerWidth, window.innerHeight);
                    canvas.parent('rain-canvas-container');
                    rain = new Rain(120);
                };
                
                p.draw = () => {
                    p.background(58, 107, 158, 60);
                    rain.update();
                    rain.resolveCollisions();
                    rain.cullSplats();
                    rain.draw();
                };
                
                p.windowResized = () => {
                    p.resizeCanvas(window.innerWidth, window.innerHeight);
                };
            }, 'rain-canvas-container');
        }

        function startSnowAnimation() {
            const canvas = document.getElementById('snow-canvas');
            if (!canvas) return;
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            
            let particles = [];
            const particleCount = 250;
            
            class SnowParticle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.radius = Math.random() * 3 + 1;
                    this.speedY = Math.random() * 1.5 + 0.5;
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.opacity = Math.random() * 0.5 + 0.3;
                }
                
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    
                    if (this.y > canvas.height) {
                        this.y = -this.radius;
                        this.x = Math.random() * canvas.width;
                    }
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                }
                
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new SnowParticle());
            }
            
            function animate() {
                if (!canvas || canvas.style.display === 'none') return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
                
                requestAnimationFrame(animate);
            }
            
            animate();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        function removeRainCanvas() {
            if (window.rainSketch) {
                window.rainSketch.remove();
                window.rainSketch = null;
            }
        }

        window.onload = () => {
            fetchWeather();
        };
    </script>
</body>
</html>
