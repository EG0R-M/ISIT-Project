<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода в Иркутске</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/weather_style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>
<body>
    <div class="weather-container">
        <div class="weather-card">
            <h1>Погода в Иркутске</h1>
            <div class="weather-info">
                <div class="weather-type" id="weatherType">Загрузка...</div>
                <div class="temperature" id="temperature">--°C</div>
                <div class="advice">
                    <div class="advice-text" id="adviceText">Загрузка совета...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="rain-container" class="animation-container" style="display: none;"></div>
    <div id="snow-container" class="animation-container" style="display: none;">
        <canvas id="snow-canvas"></canvas>
    </div>
    <div id="clouds-container" class="animation-container" style="display: none;">
        <div class="clouds-animation">
            <div class="cloud x1"></div><div class="cloud x2"></div><div class="cloud x3"></div>
            <div class="cloud x4"></div><div class="cloud x5"></div><div class="cloud x6"></div>
            <div class="cloud x7"></div><div class="cloud x8"></div><div class="cloud x9"></div><div class="cloud x10"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/weather.js') }}"></script>
</body>
</html>
