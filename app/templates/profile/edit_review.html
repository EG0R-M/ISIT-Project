{% extends 'base.html' %}
{% block title %}Редактирование отзыва{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Редактирование отзыва на "{{ review.event.title }}"</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Оценка (1-5)</label>
                <select name="rating" class="form-select">
                    <option value="5" {% if review.rating==5 %}selected{% endif %}>5 - Отлично</option>
                    <option value="4" {% if review.rating==4 %}selected{% endif %}>4 - Хорошо</option>
                    <option value="3" {% if review.rating==3 %}selected{% endif %}>3 - Средне</option>
                    <option value="2" {% if review.rating==2 %}selected{% endif %}>2 - Плохо</option>
                    <option value="1" {% if review.rating==1 %}selected{% endif %}>1 - Ужасно</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Комментарий</label>
                <textarea name="comment" class="form-control" rows="5">{{ review.comment }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('profile.my_reviews') }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
