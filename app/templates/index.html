{% extends 'base.html' %}
{% block title %}Главная{% endblock %}
{% block content %}
<div class="jumbotron bg-light p-5 rounded mb-4">
    <h1 class="display-4">Добро пожаловать на Фишку!</h1>
    <p class="lead">Покупайте билеты на кино, театр, концерты и другие мероприятия.</p>
    <hr class="my-4">
</div>

<!-- Карусель популярных мест -->
<h2>Популярные места</h2>
<div class="venues-carousel">
    <button class="carousel-btn left" onclick="scrollVenues(-300)">❮</button>
    <div class="venues-wrapper" id="venuesWrapper">
        <div class="venues-container" id="venuesContainer">
            <div class="text-center p-5">Загрузка...</div>
        </div>
    </div>
    <button class="carousel-btn right" onclick="scrollVenues(300)">❯</button>
</div>

{% endblock %}

{% block scripts %}
<script>
// Погода
fetch('/weather/api/weather')
    .then(response => response.json())
    .then(data => {
        const icons = {'rain':'🌧️','snow':'❄️','clouds':'☁️','clear':'☀️'};
        const icon = icons[data.weather_type] || '☀️';
        const weatherHtml = `
            <div style="font-size: 3rem;">${icon}</div>
            <div class="display-6">${data.temperature}°C</div>
            <div class="text-muted">${data.description}</div>
            <div class="alert alert-info mt-2">💡 ${data.advice}</div>
        `;
        document.getElementById('weather-info').innerHTML = weatherHtml;
    })
    .catch(() => {
        document.getElementById('weather-info').innerHTML = '<p class="text-danger">Не удалось загрузить погоду</p>';
    });

// Функция прокрутки карусели
function scrollVenues(delta) {
    const wrapper = document.getElementById('venuesWrapper');
    wrapper.scrollBy({ left: delta, behavior: 'smooth' });
}

// Загрузка популярных мест
fetch('/api/venues/popular')
    .then(response => response.json())
    .then(venues => {
        const container = document.getElementById('venuesContainer');
        container.innerHTML = '';
        if (venues.length === 0) {
            container.innerHTML = '<div class="alert alert-warning">Нет данных о популярных местах</div>';
            return;
        }
        // Добавляем карточки заведений (максимум 10)
        venues.forEach(venue => {
            const card = document.createElement('div');
            card.className = 'venue-card';
            card.innerHTML = `
                <img src="${venue.image_url}" alt="${venue.name}">
                <div class="card-body">
                    <h5 class="card-title">${venue.name}</h5>
                    <p class="card-text">${venue.city}</p>
                    <p class="rating">⭐ ${venue.rating}</p>
                    <a href="/venues/${venue.id}" class="btn btn-sm btn-primary">Подробнее</a>
                </div>
            `;
            container.appendChild(card);
        });
        // Добавляем карточку "Смотреть всё"
        const seeAllCard = document.createElement('div');
        seeAllCard.className = 'venue-card see-all-card';
        seeAllCard.innerHTML = `
            <div class="card-body">
                <h3>🏢</h3>
                <h5>Смотреть все места</h5>
                <p>Более ${venues.length}+ заведений</p>
                <a href="/venues" class="btn btn-light">Перейти →</a>
            </div>
        `;
        container.appendChild(seeAllCard);
    })
    .catch(error => {
        console.error('Ошибка загрузки мест:', error);
        document.getElementById('venuesContainer').innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
    });
</script>
{% endblock %}
