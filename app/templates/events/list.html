{% extends 'base.html' %}
{% block title %}Афиша{% endblock %}
{% block content %}
<h1>Мероприятия</h1>
<div class="mb-3">
    <form method="GET" class="row g-2">
        <div class="col-auto">
            <select name="category" class="form-select">
                <option value="">Все категории</option>
                {% for cat in categories %}
                    <option value="{{ cat }}" {% if selected == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Фильтр</button>
        </div>
    </form>
</div>
<div class="row">
    {% for event in events %}
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ event.title }}</h5>
                    <p class="card-text">{{ event.description[:100] }}...</p>
                    <p><strong>Категория:</strong> {{ event.category }}</p>
                    <a href="{{ url_for('events.detail', event_id=event.id) }}" class="btn btn-primary">Подробнее</a>
                </div>
            </div>
        </div>
    {% else %}
        <p>Мероприятий не найдено.</p>
    {% endfor %}
</div>
{% endblock %}
