{% extends 'base.html' %}
{% block title %}Поиск мероприятий{% endblock %}
{% block content %}
<h2>Поиск мероприятий</h2>
<form method="GET" class="row g-3 mb-4">
    <div class="col-md-4">
        <input type="text" name="q" class="form-control" placeholder="Название или описание" value="{{ q }}">
    </div>
    <div class="col-md-3">
        <select name="category" class="form-select">
            <option value="">Все категории</option>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if selected==cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-3">
        <input type="date" name="date_from" class="form-control" value="{{ date_from }}">
    </div>
    <div class="col-md-2">
        <button type="submit" class="btn btn-primary w-100">Искать</button>
    </div>
</form>
<div class="row">
    {% for event in events %}
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ event.title }}</h5>
                <p class="card-text">{{ event.description[:100] }}...</p>
                <a href="{{ url_for('events.detail', event_id=event.id) }}" class="btn btn-primary">Подробнее</a>
            </div>
        </div>
    </div>
    {% else %}
    <p>Ничего не найдено.</p>
    {% endfor %}
</div>
{% endblock %}
